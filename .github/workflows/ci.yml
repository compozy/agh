name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CGO_ENABLED: 0
  GO_VERSION: "1.25.4"
  BUN_VERSION: "1.3.4"

permissions:
  contents: read
  pull-requests: read

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      web: ${{ steps.filter.outputs.web }}
      relevant: ${{ steps.filter.outputs.backend == 'true' || steps.filter.outputs.web == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Filter paths
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          backend=false
          web=false
          zero_sha='0000000000000000000000000000000000000000'

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            backend=true
            web=true
          else
            if [[ "$EVENT_NAME" == "pull_request" && -n "$PR_BASE_SHA" && -n "$PR_HEAD_SHA" ]]; then
              changed_files=$(git diff --name-only "$PR_BASE_SHA" "$PR_HEAD_SHA")
            elif [[ -n "${PUSH_BEFORE_SHA:-}" && "$PUSH_BEFORE_SHA" != "$zero_sha" ]]; then
              changed_files=$(git diff --name-only "$PUSH_BEFORE_SHA" "$CURRENT_SHA")
            else
              changed_files=$(git ls-tree -r --name-only "$CURRENT_SHA")
            fi

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue

              case "$file" in
                *.go|go.mod|go.sum|Makefile|.golangci.yml|.goreleaser.yml|cliff.toml|RELEASE_NOTES.md)
                  backend=true
                  ;;
              esac

              case "$file" in
                .github/*|.release-notes/*|cmd/*|internal/*|openapi/*)
                  backend=true
                  ;;
              esac

              case "$file" in
                .bun-version|.oxfmtrc.json|.oxlintrc.json|bun.lock|package.json|tsconfig.json|tsconfig.base.json|turbo.json|vitest.config.ts)
                  web=true
                  ;;
              esac

              case "$file" in
                web/*|packages/*|scripts/*|sdk/*)
                  web=true
                  ;;
              esac
            done <<< "$changed_files"
          fi

          relevant=false
          if [[ "$backend" == "true" || "$web" == "true" ]]; then
            relevant=true
          fi

          {
            echo "backend=$backend"
            echo "web=$web"
            echo "relevant=$relevant"
          } >> "$GITHUB_OUTPUT"

  verify:
    name: Verify (fmt, lint, unit, build)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: changes
    if: needs.changes.outputs.relevant == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}
          install-tools: "true"

      - name: Set up Bun (web deps)
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-playwright: "false"

      - name: Run verification pipeline
        run: make verify
        env:
          CGO_ENABLED: 0

      - name: Upload verify artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: verify-artifacts
          path: |
            coverage.out
            test-results.xml
            web/dist
          if-no-files-found: ignore
          retention-days: 7

  e2e-combined:
    name: E2E (combined lane)
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}
          install-tools: "true"

      - name: Set up Bun (web deps + Playwright)
        uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-playwright: "true"

      - name: Run combined E2E lane
        run: make test-e2e
        env:
          CGO_ENABLED: 0
          CI: "true"

      - name: Upload E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-combined-artifacts
          path: |
            web/playwright-report
            web/test-results
            web/blob-report
            /tmp/agh-e2e-*
          if-no-files-found: ignore
          retention-days: 7

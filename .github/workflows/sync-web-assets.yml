name: Sync Web Assets

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/sync-web-assets.yml"
      - ".github/actions/setup-bun/**"
      - ".github/actions/setup-go/**"
      - ".bun-version"
      - "bun.lock"
      - "package.json"
      - "packages/ui/**"
      - "web/**"
      - "!go.mod"
      - "!go.sum"
  workflow_dispatch:

concurrency:
  group: sync-web-assets-main
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

env:
  GO_VERSION: "1.26.3"
  BUN_VERSION: "1.3.4"
  WEB_ASSETS_MODULE: github.com/compozy/agh-web-assets
  WEB_ASSETS_REPO: .tmp/agh-web-assets

jobs:
  sync:
    name: Publish assets and open bump PR
    if: github.repository == 'compozy/agh'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Exit when queued SHA is stale
        run: |
          git fetch origin main
          current_main="$(git rev-parse origin/main)"
          if [ "$GITHUB_SHA" != "$current_main" ]; then
            echo "Queued SHA $GITHUB_SHA is no longer origin/main ($current_main); skipping."
            exit 0
          fi

      - uses: ./.github/actions/setup-go
        with:
          go-version: ${{ env.GO_VERSION }}
          install-tools: "false"

      - uses: ./.github/actions/setup-bun
        with:
          bun-version: ${{ env.BUN_VERSION }}
          install-playwright: "false"

      - name: Build and prove deterministic web assets
        run: |
          go run github.com/magefile/mage@v1.17.0 webBuild
          go run github.com/magefile/mage@v1.17.0 webAssetsDeterminismCheck
          digest="$(go run github.com/magefile/mage@v1.17.0 webAssetsDigest)"
          echo "WEB_ASSETS_DIGEST=$digest" >> "$GITHUB_ENV"

      - name: Checkout web assets repository
        uses: actions/checkout@v4
        with:
          repository: compozy/agh-web-assets
          token: ${{ secrets.AGH_WEB_ASSETS_TOKEN || secrets.RELEASE_TOKEN }}
          path: ${{ env.WEB_ASSETS_REPO }}
          fetch-depth: 0
          fetch-tags: true

      - name: Prepare assets module
        run: |
          go run github.com/magefile/mage@v1.17.0 webAssetsPrepare "$WEB_ASSETS_REPO" "$GITHUB_SHA"

      - name: Commit or reuse assets tag
        run: |
          set -euo pipefail

          git -C "$WEB_ASSETS_REPO" fetch --tags origin
          git -C "$WEB_ASSETS_REPO" config user.name "github-actions[bot]"
          git -C "$WEB_ASSETS_REPO" config user.email "github-actions[bot]@users.noreply.github.com"

          matching_tag=""
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_assets="$(git -C "$WEB_ASSETS_REPO" show "${tag}:assets.go" 2>/dev/null || true)"
            if printf '%s\n' "$tag_assets" | grep -Fq "BuildDigest = \"${WEB_ASSETS_DIGEST}\"" &&
               printf '%s\n' "$tag_assets" | grep -Fq "SourceCommit = \"${GITHUB_SHA}\""; then
              matching_tag="$tag"
              break
            fi
          done < <(git -C "$WEB_ASSETS_REPO" tag --list 'v*' --sort=-v:refname)

          if [ -n "$matching_tag" ]; then
            echo "Reusing existing assets tag $matching_tag for $GITHUB_SHA"
            echo "WEB_ASSETS_TAG=$matching_tag" >> "$GITHUB_ENV"
            exit 0
          fi

          if git -C "$WEB_ASSETS_REPO" diff --quiet -- dist assets.go; then
            assets_tag="$(git -C "$WEB_ASSETS_REPO" tag --points-at HEAD --list 'v*' | sort -V | tail -n 1)"
            if [ -z "$assets_tag" ]; then
              assets_tag="$(go run github.com/magefile/mage@v1.17.0 webAssetsNextTag "$WEB_ASSETS_REPO")"
              git -C "$WEB_ASSETS_REPO" tag -a "$assets_tag" -m "AGH web assets $GITHUB_SHA"
              git -C "$WEB_ASSETS_REPO" push origin "$assets_tag"
            fi
            echo "WEB_ASSETS_TAG=$assets_tag" >> "$GITHUB_ENV"
            exit 0
          fi

          git -C "$WEB_ASSETS_REPO" add dist assets.go
          git -C "$WEB_ASSETS_REPO" commit -m "build: sync AGH web assets ${GITHUB_SHA::7}"
          assets_tag="$(go run github.com/magefile/mage@v1.17.0 webAssetsNextTag "$WEB_ASSETS_REPO")"
          git -C "$WEB_ASSETS_REPO" tag -a "$assets_tag" -m "AGH web assets $GITHUB_SHA"
          git -C "$WEB_ASSETS_REPO" push origin HEAD:main "$assets_tag"
          echo "WEB_ASSETS_TAG=$assets_tag" >> "$GITHUB_ENV"

      - name: Wait for public module availability
        run: |
          set -euo pipefail

          public_root="$(mktemp -d)"
          for attempt in {1..30}; do
            if env \
              GO111MODULE=on \
              GOFLAGS=-mod=mod \
              GOMODCACHE="$public_root/mod" \
              GONOSUMDB= \
              GOPATH="$public_root/gopath" \
              GOPRIVATE= \
              GOPROXY=https://proxy.golang.org,direct \
              GOSUMDB=sum.golang.org \
              go list -m "${WEB_ASSETS_MODULE}@${WEB_ASSETS_TAG}"; then
              exit 0
            fi
            echo "Waiting for ${WEB_ASSETS_MODULE}@${WEB_ASSETS_TAG} to resolve publicly (attempt $attempt)..."
            sleep 20
          done

          echo "::error::${WEB_ASSETS_MODULE}@${WEB_ASSETS_TAG} did not resolve publicly"
          exit 1

      - name: Update pinned assets module
        env:
          GOFLAGS: -mod=mod
          GONOPROXY: ""
          GONOSUMDB: ""
          GOPRIVATE: ""
          GOPROXY: https://proxy.golang.org,direct
          GOSUMDB: sum.golang.org
        run: |
          go get "${WEB_ASSETS_MODULE}@${WEB_ASSETS_TAG}"
          go mod tidy

      - name: Validate release install contract
        run: go run github.com/magefile/mage@v1.17.0 releaseInstallCheck

      - name: Write pull request body
        run: |
          cat > "$RUNNER_TEMP/web-assets-pr-body.md" <<EOF
          Syncs the pinned AGH web assets module.

          - Assets tag: ${WEB_ASSETS_TAG}
          - Build digest: ${WEB_ASSETS_DIGEST}
          - Source commit: ${GITHUB_SHA}

          Verification:

          - go run github.com/magefile/mage@v1.17.0 webBuild
          - go run github.com/magefile/mage@v1.17.0 webAssetsDeterminismCheck
          - go run github.com/magefile/mage@v1.17.0 releaseInstallCheck
          EOF

      - name: Open or update assets bump PR
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          branch: build/sync-web-assets
          delete-branch: true
          title: "build: sync web assets module"
          commit-message: "build: sync web assets module"
          body-path: ${{ runner.temp }}/web-assets-pr-body.md
          add-paths: |
            go.mod
            go.sum

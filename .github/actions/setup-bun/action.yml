name: "Setup Bun Environment"
description: "Sets up Bun with caching, dependency installation, and optional Playwright browsers for AGH web/"

inputs:
  bun-version:
    description: "Bun version to install (fallback if .bun-version missing)"
    required: false
    default: "1.3.4"
  cache-key-suffix:
    description: "Additional suffix for cache key"
    required: false
    default: ""
  install-dependencies:
    description: "Install workspace dependencies with bun install --frozen-lockfile from the repo root"
    required: false
    default: "true"
  install-playwright:
    description: "Install Playwright browsers (chromium) with system deps"
    required: false
    default: "false"

outputs:
  bun-version:
    description: "The Bun version that was installed"
    value: ${{ steps.setup-bun.outputs.bun-version }}
  cache-hit:
    description: "Whether the Bun dependencies cache was hit"
    value: ${{ steps.bun-cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Set up Bun
      id: setup-bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version-file: .bun-version
        bun-version: ${{ inputs.bun-version }}

    - name: Cache Bun dependencies
      id: bun-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/.bun/install/cache
          node_modules
          web/node_modules
          packages/ui/node_modules
          packages/site/node_modules
          sdk/typescript/node_modules
          sdk/create-extension/node_modules
          sdk/examples/prompt-enhancer/node_modules
        key: ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-version }}-${{
          hashFiles('bun.lock', '**/package.json', '.bun-version') }}${{
          inputs.cache-key-suffix }}
        restore-keys: |
          ${{ runner.os }}-bun-${{ steps.setup-bun.outputs.bun-version }}-
          ${{ runner.os }}-bun-

    - name: Install workspace dependencies
      if: inputs.install-dependencies == 'true'
      shell: bash
      run: |
        echo "Installing workspace dependencies with Bun..."
        bun install --frozen-lockfile

    - name: Cache Playwright browsers
      if: inputs.install-playwright == 'true'
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: ~/.cache/ms-playwright
        key: ${{ runner.os }}-playwright-${{ hashFiles('bun.lock', '**/package.json', '.bun-version') }}
        restore-keys: |
          ${{ runner.os }}-playwright-

    - name: Install Playwright browsers
      if: inputs.install-playwright == 'true'
      shell: bash
      working-directory: web
      run: |
        echo "Installing Playwright (chromium) with system deps..."
        bunx playwright install --with-deps chromium

    - name: Report setup status
      shell: bash
      run: |-
        echo "Bun setup completed successfully."
        echo "Bun version: $(bun --version)"
        echo "Cache hit: ${{ steps.bun-cache.outputs.cache-hit }}"
        echo "Dependencies installed: ${{ inputs.install-dependencies }}"
        echo "Playwright installed: ${{ inputs.install-playwright }}"

sidecar: git@github.com:compozy/specs.git
settings:
  guardrails:
    max_files: 10000
    max_bytes: 209715200
  hooks:
    pre_push_timeout: 30s
    allow_skip_env: SKEEPER_SKIP
namespaces:
  - name: agh
    patterns:
      - .compozy/tasks/**/*.md
      - docs/rfcs/**
      - docs/_refacs/**
      - docs/prs/**
      - docs/ideas/**
      - docs/proposals/**
      - .codex/ledger/**
      - .codex/plans/**
      - .compozy/tasks/*/state.yaml
      - .compozy/tasks/**/qa/*.json
      - .compozy/tasks/**/qa/*.yaml
      - .compozy/tasks/**/qa/*.jsonl
      - .compozy/tasks/**/_evidence/**
      - .compozy/tasks/**/*.html
      - .compozy/tasks/**/*.md.backup
      - .compozy/tasks/**/.gitkeep
      - .compozy/tasks/**/.empty
      - .codex/loop/**
      - .codex/qa/**
      - .compozy/tasks/_archived/**
      - .compozy/_archived/**

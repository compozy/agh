<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Surface Elevation</title>
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        padding: 0;
        background: #0e0e0f;
      }
      .wrap {
        padding: 24px;
      }
      .tag {
        font-family: var(--font-mono);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #636366;
        margin-bottom: 8px;
      }
      .l0 {
        background: #0e0e0f;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #3c3a39;
      }
      .l1 {
        background: #141312;
        padding: 20px;
        border-radius: 12px;
        border: 1px solid #3c3a39;
      }
      .l2 {
        background: #1e1c1b;
        padding: 16px;
        border-radius: 12px;
        border: 1px solid #3c3a39;
      }
      .l3 {
        background: #2e2c2b;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid transparent;
        color: #e5e5e7;
        font-family: "Inter", sans-serif;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="tag">Elevation · canvas-deep → canvas → surface → surface-elevated</div>
      <div class="l0">
        <div class="l1">
          <div class="l2">
            <div class="l3">Popover / elevated control · #2E2C2B</div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>

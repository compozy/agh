<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Feature Card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
      }
      body {
        padding: 22px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
      .card {
        border: 1px solid #3c3a39;
        background: #1e1c1b;
        border-radius: 12px;
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .well {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        background: #2e2c2b;
        color: #e8572a;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .eye {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #e8572a;
      }
      .title {
        font-family: "Inter", sans-serif;
        font-size: 15px;
        font-weight: 500;
        line-height: 1.3;
        color: #e5e5e7;
        margin: 0;
      }
      .desc {
        font-family: "Inter", sans-serif;
        font-size: 13px;
        line-height: 1.55;
        color: #8e8e93;
        margin: 0;
      }
      .cite {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #636366;
        margin-top: auto;
        padding-top: 6px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="well">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <ellipse cx="12" cy="5" rx="9" ry="3" />
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5" />
          <path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3" />
        </svg>
      </div>
      <span class="eye">Sessions</span>
      <h3 class="title">Resume any agent run</h3>
      <p class="desc">
        Every agent run is a durable session. Stop, resume, inspect every step, fork from any point.
      </p>
      <a class="cite">source ↗</a>
    </div>
    <div class="card">
      <div class="well">
        <svg
          width="16"
          height="16"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .962 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .962L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.962 0z"
          />
        </svg>
      </div>
      <span class="eye">Memory</span>
      <h3 class="title">Context that survives restarts</h3>
      <p class="desc">
        Global and per-workspace memory in plain Markdown. Four types, one index per scope.
      </p>
      <a class="cite">source ↗</a>
    </div>
  </body>
</html>

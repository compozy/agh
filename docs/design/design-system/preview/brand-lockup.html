<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Brand Lockup</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;600&family=Playfair+Display:wght@400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #141312;
      }
      body {
        padding: 22px;
      }
      .lock {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 14px;
      }
      .word {
        font-family: "NuixyberNext", "Inter", sans-serif;
        font-size: 28px;
        letter-spacing: -0.03em;
        color: #e5e5e7;
      }
      .rule {
        width: 30px;
        height: 1px;
        background: #3c3a39;
      }
      .tag {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 600;
        color: #636366;
        text-transform: uppercase;
        letter-spacing: 0.16em;
      }
      .headline {
        font-family: "Playfair Display", serif;
        font-weight: 400;
        font-size: 32px;
        letter-spacing: -0.035em;
        line-height: 0.98;
        color: #e5e5e7;
        margin: 0;
        max-width: 14ch;
      }
    </style>
  </head>
  <body>
    <div class="lock">
      <span class="tag" style="color: #e8572a">AGH</span>
      <span class="rule"></span>
      <span class="tag">Agent Operating System</span>
    </div>
    <h1 class="headline">An agent runtime with a network built in.</h1>
  </body>
</html>

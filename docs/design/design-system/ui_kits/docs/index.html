<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>AGH Docs UI Kit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../colors_and_type.css" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #141312;
        min-height: 100vh;
      }
      * {
        box-sizing: border-box;
      }
      a {
        transition: color 0.15s;
      }
    </style>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="../marketing/Primitives.jsx"></script>
    <script type="text/babel" src="./Shell.jsx"></script>
    <script type="text/babel" src="./DocBlocks.jsx"></script>
    <script type="text/babel" src="./Pages.jsx"></script>
    <script type="text/babel">
      function App() {
        const [page, setPage] = React.useState("sessions");
        return (
          <>
            <DocsHeader />
            <div
              style={{ display: "flex", alignItems: "stretch", maxWidth: 1400, margin: "0 auto" }}
            >
              <DocsSidebar current={page} onPick={setPage} />
              <main style={{ flex: 1, padding: "40px 48px", maxWidth: 820 }}>
                <SessionsPage />
              </main>
              <DocsToc />
            </div>
            <DocsFooter />
          </>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>

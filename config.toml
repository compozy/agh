[daemon]
socket = "~/.agh/daemon.sock"

[http]
host = "localhost"
port = 2123

[defaults]
agent = "general"
provider = "claude"

[limits]
max_sessions = 10
max_concurrent_agents = 20

[permissions]
mode = "approve-all"

[tools]
enabled = true
hosted_mcp_enabled = true
default_max_result_bytes = 262144

[tools.hosted_mcp]
bind_nonce_ttl_seconds = 30

[tools.policy]
external_default = "disabled"
approval_timeout_seconds = 120
trusted_sources = []

[providers.claude]
default_model = "claude-sonnet-4-20250514"
api_key_env = "ANTHROPIC_API_KEY"

[providers.codex]
default_model = "gpt-4o"
api_key_env = "OPENAI_API_KEY"

[providers.gemini]
default_model = "gemini-2.5-pro"
api_key_env = "GEMINI_API_KEY"

[observability]
enabled = true
retention_days = 7
max_global_bytes = 1073741824

[observability.transcripts]
enabled = true
segment_bytes = 1048576
max_bytes_per_session = 268435456

[log]
level = "info"

[extension]
name = "prompt-enhancer"
version = "0.1.0"
description = "Adds workspace context to the assembled prompt"
min_agh_version = "0.5.0"

[capabilities]
provides = ["prompt.provider"]

[actions]
requires = ["sessions/list"]

[[resources.hooks]]
name = "workspace-context"
event = "prompt.post_assemble"
mode = "sync"
executor.kind = "subprocess"
executor.command = "node"
executor.args = ["dist/index.js", "hook", "prompt_post_assemble"]

[subprocess]
command = "node"
args = ["dist/index.js", "serve"]

[subprocess.env]
AGH_PROMPT_ENHANCER_HANDSHAKE_PATH = "{{env:AGH_PROMPT_ENHANCER_HANDSHAKE_PATH}}"
AGH_PROMPT_ENHANCER_HOST_CALL_PATH = "{{env:AGH_PROMPT_ENHANCER_HOST_CALL_PATH}}"
AGH_PROMPT_ENHANCER_CAPABILITY_PATH = "{{env:AGH_PROMPT_ENHANCER_CAPABILITY_PATH}}"
AGH_PROMPT_ENHANCER_SHUTDOWN_PATH = "{{env:AGH_PROMPT_ENHANCER_SHUTDOWN_PATH}}"

[security]
capabilities = ["session.read"]
